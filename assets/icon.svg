<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- background slate -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16191c"/>
      <stop offset="0.55" stop-color="#0e1113"/>
      <stop offset="1" stop-color="#070809"/>
    </linearGradient>
    <!-- ember glow -->
    <radialGradient id="ember" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffcf6b"/>
      <stop offset="0.35" stop-color="#f2911f"/>
      <stop offset="0.7" stop-color="#a3261a"/>
      <stop offset="1" stop-color="#a3261a" stop-opacity="0"/>
    </radialGradient>
    <!-- steel face of the anvil -->
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfd6da"/>
      <stop offset="0.12" stop-color="#9aa3a8"/>
      <stop offset="0.5" stop-color="#5b6469"/>
      <stop offset="1" stop-color="#2a3034"/>
    </linearGradient>
    <linearGradient id="steelEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <!-- under-glow on the anvil belly -->
    <linearGradient id="heat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a3034"/>
      <stop offset="1" stop-color="#7a2a12"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="9"/>
    </filter>
    <clipPath id="round"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- faint angular tooling grid -->
    <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
      <path d="M0 128 H512 M0 256 H512 M0 384 H512 M128 0 V512 M256 0 V512 M384 0 V512"/>
    </g>

    <!-- ember pool under the anvil -->
    <ellipse cx="256" cy="372" rx="150" ry="58" fill="url(#ember)" filter="url(#soft)" opacity="0.95"/>
    <ellipse cx="256" cy="372" rx="92" ry="30" fill="#ffd98a" opacity="0.55" filter="url(#soft)"/>

    <!-- rising sparks -->
    <g fill="#ffce6a">
      <circle cx="172" cy="300" r="3.2" opacity="0.9"/>
      <circle cx="344" cy="286" r="2.6" opacity="0.85"/>
      <circle cx="318" cy="232" r="2.2" opacity="0.7"/>
      <circle cx="196" cy="246" r="2.0" opacity="0.7"/>
      <circle cx="372" cy="332" r="3.6" opacity="0.8"/>
      <circle cx="150" cy="346" r="2.8" opacity="0.8"/>
      <rect x="288" y="196" width="4" height="4" transform="rotate(45 290 198)" opacity="0.6"/>
      <rect x="222" y="208" width="4" height="4" transform="rotate(45 224 210)" opacity="0.55"/>
    </g>

    <!-- ANVIL -->
    <g>
      <!-- main body: horn / overhanging face / slim tall waist / short flared foot -->
      <path d="M104,231 L152,206 L368,206 L368,248 L284,248 L280,330 L344,330
               L344,366 L168,366 L168,330 L232,330 L228,248 L152,248 Z"
            fill="url(#steel)" stroke="#15181b" stroke-width="3" stroke-linejoin="round"/>

      <!-- top working face highlight band -->
      <path d="M152,206 L368,206 L362,221 L158,221 Z" fill="url(#steelEdge)" opacity="0.9"/>
      <!-- razor top edge -->
      <path d="M152,206 L368,206" stroke="#ffffff" stroke-opacity="0.95" stroke-width="2.5" stroke-linecap="round"/>
      <!-- horn top facet -->
      <path d="M104,231 L152,206 L152,228 Z" fill="#c2c9cd" opacity="0.65"/>
      <!-- waist centre seam -->
      <path d="M256,224 L256,322" stroke="#0e1113" stroke-opacity="0.22" stroke-width="2"/>
      <!-- warm wash only on the lower foot, subtle -->
      <path d="M232,330 L280,330 L344,366 L168,366 Z" fill="#ff7e2c" opacity="0.16"/>
      <!-- bright hot rim along the very bottom -->
      <path d="M168,366 L344,366" stroke="#ffb04a" stroke-opacity="0.85" stroke-width="3.5" stroke-linecap="round"/>
    </g>

    <!-- inner border frame -->
    <rect x="14" y="14" width="484" height="484" rx="100" fill="none"
          stroke="#e8a33d" stroke-opacity="0.22" stroke-width="2"/>
  </g>
</svg>
